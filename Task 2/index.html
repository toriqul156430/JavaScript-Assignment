<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book List</title>
</head>
<body>

  <h2>Book List</h2>

  <input type="text" id="bookName" placeholder="Book Name">
  <input type="text" id="authorName" placeholder="Author Name">
  <button id="addBtn">Add Book</button>

  <table border="1">
    <thead>
      <tr>
        <th>Book</th>
        <th>Author</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="bookList"></tbody>
  </table>

  <script src="script.js"></script>
</body>
</html>
